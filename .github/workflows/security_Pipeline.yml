name: DevSecOps Secret Scanner (Gitleaks)

on: 
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  scan-secrets:
    runs-on: ubuntu-latest

    steps:
      # 1. Download the code (fetch-depth: 0 tells it to grab the entire history)
      - name: Download Repository Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 2. Run the official open-source Gitleaks scanner
      - name: Execute Gitleaks Scanner
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
